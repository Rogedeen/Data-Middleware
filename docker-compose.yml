services:
  middleware:
    build:
      context: .
      dockerfile: middleware/Dockerfile
    container_name: ceng302-middleware
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - OUTPUT_DIR=/app/output
    volumes:
      - ./output:/app/output
    networks:
      - ceng302-net

  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    container_name: ceng302-producer
    environment:
      - MIDDLEWARE_HOST=middleware
      - MIDDLEWARE_PORT=3000
      - CHUNK_SIZE=500
      - GENERATION_INTERVAL_MS=100
      - NODE_ENV=production
    depends_on:
      - middleware
    networks:
      - ceng302-net

  log-rotator:
    image: alpine:latest
    container_name: ceng302-log-rotator
    volumes:
      - ./output:/output
    restart: always
    command: >
      sh -c "
      echo 'Starting sidecar log-rotator...';
      while true; do
        if [ -f /output/cybersec.csv ]; then
          size=$$(stat -c%s /output/cybersec.csv 2>/dev/null || echo 0);
          if [ $$size -ge 5242880 ]; then
            echo 'cybersec.csv reached 5MB. Attempting log rotation...';
            rm -f /output/cybersec.3.csv;
            mv /output/cybersec.2.csv /output/cybersec.3.csv 2>/dev/null;
            mv /output/cybersec.1.csv /output/cybersec.2.csv 2>/dev/null;
            if mv /output/cybersec.csv /output/cybersec.1.csv 2>/dev/null; then
              echo 'Timestamp;Level;FullName;TCNo;CreditCard;Email;Message;SenderId;TransactionNo;Details' > /output/cybersec.csv;
              echo 'Log rotation successful.';
            else
              echo 'Failed to rotate cybersec.csv. File might be locked by another process (e.g. Excel). Will retry...';
            fi;
          fi;
        fi;
        sleep 5;
      done
      "
    networks:
      - ceng302-net

networks:
  ceng302-net:
    driver: bridge
